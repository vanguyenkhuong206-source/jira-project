<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="fas fa-recycle me-2"></i>WastePlatform
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        <i class="fas fa-tachometer-alt me-1"></i>Admin
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('CITIZEN')">
                    <a class="nav-link" th:href="@{/citizen/dashboard}">
                        <i class="fas fa-home me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CITIZEN')">
                    <a class="nav-link" th:href="@{/citizen/report-form}">
                        <i class="fas fa-plus me-1"></i>Báo cáo rác
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ENTERPRISE')">
                    <a class="nav-link" th:href="@{/enterprise/dashboard}">
                        <i class="fas fa-building me-1"></i>Dashboard
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('COLLECTOR')">
                    <a class="nav-link" th:href="@{/collector/dashboard}">
                        <i class="fas fa-truck me-1"></i>Dashboard
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-warning">
                        <i class="fas fa-user me-1"></i>
                        <span sec:authentication="name">User</span>
                    </span>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                            <i class="fas fa-sign-out-alt me-1"></i>Đăng xuất
                        </button>
                    </form>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">Đăng nhập</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
