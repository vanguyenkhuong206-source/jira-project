<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký - WastePlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a5c2a 0%, #2d8a4e 100%); min-height: 100vh; }
        .register-card { border-radius: 20px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card register-card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-recycle fa-3x text-success"></i>
                        <h3 class="fw-bold mt-2">Tạo tài khoản mới</h3>
                    </div>

                    <div th:if="${errorMsg}" class="alert alert-danger">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                    </div>

                    <form th:action="@{/auth/register}" method="post"
                          th:object="${registerRequest}" novalidate>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Username *</label>
                                <input type="text" th:field="*{username}" class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="Tên đăng nhập"/>
                                <div class="invalid-feedback" th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Email *</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="Email của bạn"/>
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Họ và tên *</label>
                            <input type="text" th:field="*{fullName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   placeholder="Nhập họ tên đầy đủ"/>
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu *</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="Ít nhất 6 ký tự"/>
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control"
                                       placeholder="0901234567"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Vai trò *</label>
                                <select th:field="*{role}" class="form-select"
                                        th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                                    <option value="">-- Chọn vai trò --</option>
                                    <option value="CITIZEN">🏠 Người dân (Citizen)</option>
                                    <option value="ENTERPRISE">🏭 Doanh nghiệp tái chế</option>
                                    <option value="COLLECTOR">🚛 Nhân viên thu gom</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{role}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <textarea th:field="*{address}" class="form-control" rows="2"
                                      placeholder="Địa chỉ của bạn"></textarea>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
                            <i class="fas fa-user-plus me-2"></i>Đăng ký
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="text-muted mb-0">Đã có tài khoản?
                            <a th:href="@{/auth/login}" class="text-success fw-bold">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
