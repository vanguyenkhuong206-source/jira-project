<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - WastePlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a5c2a 0%, #2d8a4e 100%); min-height: 100vh; }
        .login-card { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand-icon { font-size: 3rem; color: #28a745; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-recycle brand-icon"></i>
                        <h3 class="fw-bold mt-2 text-success">WastePlatform</h3>
                        <p class="text-muted small">Nền tảng thu gom & tái chế rác</p>
                    </div>

                    <!-- Alert messages -->
                    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${successMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user me-1 text-success"></i>Tên đăng nhập
                            </label>
                            <input type="text" name="username" class="form-control form-control-lg"
                                   placeholder="Nhập username" required autofocus/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-lock me-1 text-success"></i>Mật khẩu
                            </label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="Nhập mật khẩu" required/>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                        </button>
                    </form>

                    <hr class="my-4"/>
                    <div class="text-center">
                        <p class="text-muted mb-0">Chưa có tài khoản?
                            <a th:href="@{/auth/register}" class="text-success fw-bold">Đăng ký ngay</a>
                        </p>
                    </div>

                    <!-- Demo accounts hint -->
                    <div class="mt-3 p-3 bg-light rounded small">
                        <strong>Tài khoản demo:</strong><br>
                        Admin: <code>admin / Admin@123</code><br>
                        Citizen: <code>citizen1 / Admin@123</code><br>
                        Enterprise: <code>enterprise1 / Admin@123</code><br>
                        Collector: <code>collector1 / Admin@123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
